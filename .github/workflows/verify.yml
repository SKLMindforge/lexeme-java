name: Verify Lexeme Library

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Compile and Run Test
        # This compiles your code and runs the TestLexeme class
        run: |
          mvn compile
          mvn exec:java -Dexec.mainClass="com.sklmindforge.TestLexeme"
