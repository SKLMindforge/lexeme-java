name: Verify Lexeme Library

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Debug - List Files
        run: find . -maxdepth 4

      - name: Build and Test
        run: |
          mvn clean compile
          mvn exec:java -Dexec.mainClass="com.sklmindforge.TestLexeme"
